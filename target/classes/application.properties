# ==========================================
# APPLICATION
# ==========================================
spring.application.name=clinix-manager
server.port=8080

# ==========================================
# BASE DE DONNÉES PostgreSQL
# ==========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/clinix_db
spring.datasource.username=postgres
spring.datasource.password=Aurlin10
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# JPA / HIBERNATE
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Garantit que data.sql s'exécute APRÈS que Hibernate crée les tables
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ==========================================
# JWT
# ==========================================
# Clé secrète Base64 (min 256 bits pour HMAC-SHA256)
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expiration=86400000

# ==========================================
# SWAGGER / OPENAPI
# ==========================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ==========================================
# LOGGING
# ==========================================
logging.level.com.clinix=DEBUG
logging.level.org.springframework.security=INFO
